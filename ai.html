<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        /* Modern UI Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
        }

        /* 1. The Chat Icon (Floating Action Button) */
        #chat-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: #007bff;
            /* Bright Blue */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            transition: all 0.3s ease;
        }

        #chat-icon:hover {
            transform: scale(1.1);
            background: #0056b3;
        }

        /* 2. The Chat Window (Hidden by Default) */
        #chat-container {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 380px;
            height: 550px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: none;
            /* Starts hidden */
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
            border: 1px solid #ddd;
        }

        #chat-header {
            background: #007bff;
            color: white;
            padding: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #close-btn {
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f9f9f9;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.4;
        }

        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot {
            background: #e4e6eb;
            color: #1c1e21;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        #input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }

        #user-input {
            flex: 1;
            border: 1px solid #ddd;
            padding: 12px;
            outline: none;
            border-radius: 25px;
            margin-right: 10px;
        }

        #send-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            border-radius: 25px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="chat-icon">
        <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </div>

    <div id="chat-container">
        <div id="chat-header">
            <span>AI Support Agent</span>
            <span id="close-btn">&times;</span>
        </div>
        <div id="chat-box">
            <div class="message bot">Hello! How can I help you today?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatIcon = document.getElementById('chat-icon');
        const chatContainer = document.getElementById('chat-container');
        const closeBtn = document.getElementById('close-btn');
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        chatIcon.onclick = () => {
            chatContainer.style.display = 'flex';
            chatIcon.style.display = 'none'; // Hide icon when chat is open
        };

        closeBtn.onclick = () => {
            chatContainer.style.display = 'none';
            chatIcon.style.display = 'flex'; // Show icon when chat is closed
        };

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleChat() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            userInput.value = '';

            try {
                const response = await fetch('http://127.0.0.1:5000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                appendMessage(data.reply || "I'm having trouble connecting.", 'bot');
            } catch (error) {
                appendMessage("Error: Is your Python server running?", 'bot');
            }
        }

        sendBtn.onclick = handleChat;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') handleChat(); };
    </script>

</body>

</html>
