<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>kilimanjaro National Park</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.0/css/bootstrap.min.css'>


    <link rel="stylesheet" href="foercardslies.css">

    <link rel='stylesheet' href='https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css'>
    <i class="bi bi-caret-down-fill"></i>



</head>

<style>
    body {

        body {
            margin: 0;
            font-family: 'Cabin', 'Gill Sans', 'Gill Sans MT', sans-serif;
            font-size: 18px;
            line-height: 1.9;
            letter-spacing: -0.01em;
            color: #2a1c14;
            background: #fdfbf7;
            font-weight: 500;
        }






    }



    .hero {
        background: url("img/istockphoto-697689066-612x612.jpg") center/cover;
        height: 350px;
        color: rgb(244, 241, 241);
        text-align: center;
        font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        padding-top: 150px;
    }

    .hero h1 {
        font-size: 48px;


        font-family: 'Cabin', 'Gill Sans', 'Gill Sans MT', sans-serif;
    }

    .hero p {
        font-size: 18px;

        font-family: 'Cabin', 'Gill Sans', 'Gill Sans MT', sans-serif;
    }



    .container {
        display: flex;
        max-width: 1200px;
        margin: 40px auto;
        gap: 20px;
    }


    .left {
        flex: 3;
        background: white;
        padding: 25px;
        border-radius: 8px;
    }

    .left h2 {
        color: #2d5a27;
        margin-top: 40px;

        font-family: 'Cabin', 'Gill Sans', 'Gill Sans MT', sans-serif;
    }

    .main-img {
        width: 100%;
        border-radius: 6px;
        margin: 15px 0;
    }

    .left p {
        color: #2b1a0f;
        letter-spacing: 1.3px;
        margin-bottom: 20px;
        text-align: left;
        font-size: 18px;
        margin-bottom: 22px;
        max-width: 720px;
        line-height: 1.9;
        font-family: 'Cabin', 'Gill Sans', 'Gill Sans MT', sans-serif;
    }




    .right {
        flex: 1;
        background: #e9ddc8;
        padding: 100px;
        border-radius: 8px;
    }

    .right h1 {
        border-bottom: 2px solid #333;

        font-family: 'Cabin', 'Gill Sans', 'Gill Sans MT', sans-serif;
        padding-bottom: 5px;
    }

    .right ul {
        padding-left: 20px;
    }

    .right li {
        margin-bottom: 6px;
    }

    .right p {

        color: #2b1a0f;
        letter-spacing: 0.3px;
        margin-bottom: 20px;
        text-align: left;
        font-size: 18px;
        margin-bottom: 22px;
        max-width: 720px;
        font-family: 'Cabin', 'Gill Sans', 'Gill Sans MT', sans-serif;
    }



    .slider {
        position: relative;
        margin: 20px 0;
    }

    .slider img {
        width: 100%;
        border-radius: 6px;
    }

    .prev,
    .next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: none;
        padding: 10px 15px;
        font-size: 18px;
        cursor: pointer;
    }

    .prev {
        left: 10px;
    }

    .next {
        right: 10px;
    }

    .prev:hover,
    .next:hover {
        background: black;
    }






    @media(max-width:900px) {

        .container {
            flex-direction: column;
        }

        .hero h1 {
            font-size: 32px;
        }

    }

    .exl {
        color: #2b1a0f;
        letter-spacing: 0.3px;
        margin-bottom: 20px;
        text-align: left;
        font-size: 18px;
        margin-bottom: 22px;
        max-width: 720px;
        font-family: 'Cabin', 'Gill Sans', 'Gill Sans MT', sans-serif;
    }

    .slideshow-container {
        position: relative;
        max-width: 800px;
        width: 90%;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    #slide {
        width: 100%;
        display: block;
        transition: opacity 0.8s ease-in-out;
    }

    .fade-in {
        animation: fadeInEffect 1.5s;
    }

    @keyframes fadeInEffect {
        from {
            opacity: 0.3;
        }

        to {
            opacity: 1;
        }
    }

    .prev,
    .next {
        cursor: pointer;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);

        width: 60px;
        height: 60px;
        border-radius: 50%;

        background-color: #e9e0d2;
        color: #d35400;

        display: flex;
        align-items: center;
        justify-content: center;

        font-size: 30px;
        font-weight: bold;
        border: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
        z-index: 10;
    }

    .prev {
        left: 20px;
    }

    .next {
        right: 20px;
    }

    .prev:hover,
    .next:hover {
        background-color: #fdfaf5;
        transform: translateY(-50%) scale(1.1);
    }

    .prev::before {
        content: '❮';
    }

    .next::before {
        content: '❯';
    }

    /* --- Video Section --- */
    .video-header {
        max-width: 900px;
        margin: 0 auto 40px auto;
    }

    .video-header h2 {
        color: #4a5d23;
        /* Earthy green */
        font-size: 24px;
        margin-bottom: 20px;
        text-transform: uppercase;
    }

    .video-container {
        position: relative;
        width: 100%;
        max-width: 600px;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .video-container img {
        width: 100%;
        display: block;
    }

    .play-button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60px;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .play-button:hover {
        transform: translate(-50%, -50%) scale(1.1);
    }

    footer {
        background-color: #333;
        color: #fff;
        padding-top: 50px;
        font-size: 0.95em;
        line-height: 1.6;
    }

    .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px 40px 20px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 30px;

    }

    .footer-col {
        flex: 1;
        min-width: 250px;
    }


    .footer-logo {
        font-size: 2em;
        font-weight: bold;
        color: #4CAF50;
        margin-bottom: 10px;
    }

    .tagline {
        font-style: italic;
        color: #ccc;
        margin-bottom: 20px;
    }

    .contact-item {
        margin: 5px 0;
        color: #ccc;
    }

    .contact-item i {
        color: #4CAF50;
        margin-right: 10px;
        width: 15px;
    }


    .footer-col h4 {
        font-size: 1.2em;
        font-weight: 600;
        color: #fff;
        margin-bottom: 15px;
        border-bottom: 2px solid #4CAF50;
        display: inline-block;
        padding-bottom: 5px;
    }

    .quick-links ul {
        list-style: none;
        padding: 0;
    }

    .quick-links ul li {
        margin-bottom: 8px;
    }

    .quick-links ul li a {
        color: #ccc;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .quick-links ul li a:hover {
        color: #4CAF50;
    }


    .social-icons {
        margin-top: 15px;
        margin-bottom: 25px;
        display: flex;
        gap: 15px;
    }

    .social-icons a {
        color: #fff;
        font-size: 1.5em;
        transition: color 0.3s ease;
    }

    .social-icons a:hover {
        color: #4CAF50;
        transform: scale(1.1);
    }


    .legal-links a {
        display: block;
        color: #ccc;
        text-decoration: none;
        font-size: 0.85em;
        margin-bottom: 5px;
    }

    .legal-links a:hover {
        color: #4CAF50;
    }


    .footer-bottom {
        background-color: #222;
        text-align: center;
        padding: 15px 20px;
        font-size: 0.8em;
        color: #999;
        border-top: 1px solid #444;
    }



    @media screen and (max-width: 768px) {
        .footer-container {
            flex-direction: column;
            text-align: center;
            gap: 40px;
        }

        .footer-col {
            min-width: 100%;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;

        }


        .footer-col h4 {
            margin: 0 auto 15px auto;
        }

        .quick-links ul {
            width: fit-content;
            margin: 0 auto;
        }

        .social-icons {
            justify-content: center;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .legal-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }


        .footer-col:last-of-type {
            border-bottom: none;
        }
    }

    .footer-tours ul {
        list-style: none;
        padding: 0;
    }

    .footer-tours ul li {
        margin-bottom: 8px;
    }

    .footer-tours li a {
        color: #ccc;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .footer-tours li a:hover {
        color: #4CAF50;
    }


    .footer-tours h4 {
        font-size: 1.2em;
        font-weight: 600;
        color: #fff;
        margin-bottom: 15px;
        border-bottom: 2px solid #4CAF50;
        display: inline-block;
        padding-bottom: 5px;
    }

    .contact-info-container {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        background-color: #38761d;


        padding: 10px 20px;
        color: white;
        font-size: 16px;
    }

    .contact-item {

        margin-right: 15px;
        white-space: nowrap;
    }


    .contact-item:nth-child(even) {
        color: rgba(255, 255, 255, 0.7);
    }

    .e-heading {
        color: white;
        text-align: center;
        font-size: 2em;
        font-family: Georgia, 'Times New Roman', Times, serif;

    }

    .l-heading {
        color: #f2f5f2;
        font-family: Georgia, 'Times New Roman', Times, serif;
        text-align: center;
        margin-top: 12rem;
    }

    .container-fluid {
        font-size: 15px;
        font-family: Georgia, 'Times New Roman', Times, serif;
        font-weight: bold;
        gap: 15px;
        content: '';




    }

    .container-fluid:hover {
        transform: scale(1);
    }

    .kili-table-container {
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
        background-color: #fdfaf3;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .kili-table-title {
        color: #4a5d3a;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 25px;
        font-family: 'Arial', sans-serif;
    }

    .route-table {
        width: 100%;
        border-collapse: collapse;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 0.95rem;
    }

    .route-table thead tr {
        background-color: #4a5d3a;
        color: #ffffff;
        text-align: left;
    }

    .route-table th,
    .route-table td {
        padding: 15px 20px;
        border-bottom: 1px solid #e0d8c8;
    }

    .route-table tbody tr:nth-child(even) {
        background-color: #f4eee1;
    }

    .route-table tbody tr:hover {
        background-color: #ede4d1;
    }

    /* Status Badges */
    .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
    }

    .fitness-high {
        background: #d15a2a;
        color: white;
    }

    .fitness-mod {
        background: #c69331;
        color: white;
    }

    .traffic-low {
        color: #2ecc71;
    }

    .traffic-med {
        color: #f1c40f;
    }

    .traffic-high {
        color: #e74c3c;
    }

    @media (max-width: 600px) {
        .route-table {
            font-size: 0.8rem;
        }

        .route-table th,
        .route-table td {
            padding: 10px 5px;
        }
    }

    .slider-nav {
        background-color: #4CAF50;
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2em;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        z-index: 10;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        transition: background-color 0.3s, transform 0.2s;
    }

    .slider-nav:hover {
        background-color: #3e8e41;
        transform: translateY(-50%) scale(1.05);
    }

    .slider-nav:disabled {
        background-color: #ccc;
        cursor: not-allowed;
        box-shadow: none;
        transform: translateY(-50%);
    }

    .activity-card.hidden {
        opacity: 0;
        transform: translateY(20px);
    }

    .activity-card.visible {
        opacity: 1;
        transform: translateY(0);
    }




    @media screen and (max-width: 992px) {
        .slider-wrapper {
            padding: 0 20px;
        }

        .slider-nav {
            display: none;

        }
    }

     .navbar .nav-link {
            position: relative;
            font-weight: 600;
            font-size: 17px;
            transition: color 0.3s ease;
        }

        .navbar .nav-link:hover {
            color: #f3f5f3 !important;

        }

        .navbar .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 2px;
            background: #406445;
            transition: width 0.3s ease;
        }

        .navbar .nav-link:hover::after {
            width: 100%;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-3px);
            }

            50% {
                transform: translateX(3px);
            }

            75% {
                transform: translateX(-3px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .navbar .nav-link:hover {
            animation: shake 0.3s ease-in-out;
        }
</style>
