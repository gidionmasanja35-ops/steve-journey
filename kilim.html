<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mount Kilimanjaro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.0/css/bootstrap.min.css'>


    <link rel="stylesheet" href="foercardslies.css">

    <link rel='stylesheet' href='https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css'>
    <i class="bi bi-caret-down-fill"></i>
    <style>
        :root {
            --primary-green: #4a5d3a;
            --accent-orange: #d15a2a;
            --bg-cream: #f4eee1;
            --text-dark: #333;
            --gold-season: #c69331;
            --dark-season: #4d3d38;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-cream);
            color: var(--text-dark);
        }

        @import url("https://fonts.googleapis.com/css2?family=Baloo+2&display=swap");

        .hero {
            height: 500px;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('istockphoto-697689066-612x612.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: 3rem;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .hero p {
            max-width: 700px;
            margin: 0 20px;
            line-height: 1.6;
        }

        .tripadvisor-badge {
            margin-top: 30px;
            width: 140px;
        }

        /* Torn Paper Divider */
        .divider {
            height: 50px;
            background: var(--bg-cream);
            clip-path: polygon(0% 100%, 5% 85%, 10% 100%, 15% 80%, 20% 100%, 25% 90%, 30% 100%, 35% 85%, 40% 100%, 45% 80%, 50% 100%, 55% 90%, 60% 100%, 65% 85%, 70% 100%, 75% 80%, 80% 100%, 85% 90%, 90% 100%, 95% 85%, 100% 100%);
            margin-top: -49px;
            position: relative;
            z-index: 2;
        }

        /* --- TRIP DETAIL CONTENT (Image 2) --- */
        .detail-layout {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 50px;
            padding: 0 20px;
        }

        .description h2 {
            color: var(--primary-green);
            font-size: 2rem;
            text-transform: uppercase;
        }

        .description p {
            line-height: 1.8;
            color: #444;
        }

        .image-gallery {
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .image-gallery img {
            width: 100%;
            display: block;
        }

        .price-sidebar {
            background: #fdfaf3;
            border: 1px solid #e0d8c8;
            padding: 25px;
            border-radius: 2px;
            font-size: 0.9rem;
        }

        .price-sidebar h3 {
            text-align: center;
            color: var(--primary-green);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .season-block {
            margin-bottom: 20px;
        }

        .season-title {
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            text-align: center;
        }

        .grid-header {
            font-size: 0.75rem;
            padding-bottom: 5px;
        }

        .price-box {
            padding: 10px 5px;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .low {
            background: var(--primary-green);
        }

        .mid {
            background: var(--gold-season);
        }

        .high {
            background: var(--grey-season);
        }

        .included-section {
            margin-top: 30px;
        }

        .included-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .included-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
        }

        .check-icon {
            width: 20px;
            height: 20px;
            background: #ffcc00;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .detail-layout {
                grid-template-columns: 1fr;
            }
        }

        .contact-info-container {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            background-color: #38761d;


            padding: 10px 20px;
            color: white;
            font-size: 16px;
        }

        .contact-item {

            margin-right: 15px;
            white-space: nowrap;
        }


        .contact-item:nth-child(even) {
            color: rgba(255, 255, 255, 0.7);
        }

        .e-heading {
            color: white;
            text-align: center;
            font-size: 2em;
            font-family: Georgia, 'Times New Roman', Times, serif;

        }

        .l-heading {
            color: #f2f5f2;
            font-family: Georgia, 'Times New Roman', Times, serif;
            text-align: center;
            margin-top: 12rem;
        }

        .container-fluid {
            font-size: 15px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
            gap: 15px;
            content: '';




        }

        .container-fluid:hover {
            transform: scale(1);
        }

        footer {
            background-color: #333;
            color: #fff;
            padding-top: 50px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;

        }

        .footer-col {
            flex: 1;
            min-width: 250px;
        }


        .footer-logo {
            font-size: 2em;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .tagline {
            font-style: italic;
            color: #ccc;
            margin-bottom: 20px;
        }

        .contact-item {
            margin: 5px 0;
            color: #ccc;
        }

        .contact-item i {
            color: #4CAF50;
            margin-right: 10px;
            width: 15px;
        }


        .footer-col h4 {
            font-size: 1.2em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
            border-bottom: 2px solid #4CAF50;
            display: inline-block;
            padding-bottom: 5px;
        }

        .quick-links ul {
            list-style: none;
            padding: 0;
        }

        .quick-links ul li {
            margin-bottom: 8px;
        }

        .quick-links ul li a {
            color: #ccc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .quick-links ul li a:hover {
            color: #4CAF50;
        }


        .social-icons {
            margin-top: 15px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
        }

        .social-icons a {
            color: #fff;
            font-size: 1.5em;
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: #4CAF50;
            transform: scale(1.1);
        }


        .legal-links a {
            display: block;
            color: #ccc;
            text-decoration: none;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .legal-links a:hover {
            color: #4CAF50;
        }


        .footer-bottom {
            background-color: #222;
            text-align: center;
            padding: 15px 20px;
            font-size: 0.8em;
            color: #999;
            border-top: 1px solid #444;
        }



        @media screen and (max-width: 768px) {
            .footer-container {
                flex-direction: column;
                text-align: center;
                gap: 40px;
            }

            .footer-col {
                min-width: 100%;
                padding-bottom: 10px;
                border-bottom: 1px solid #444;

            }


            .footer-col h4 {
                margin: 0 auto 15px auto;
            }

            .quick-links ul {
                width: fit-content;
                margin: 0 auto;
            }

            .social-icons {
                justify-content: center;
                margin-top: 0;
                margin-bottom: 15px;
            }

            .legal-links {
                display: flex;
                justify-content: center;
                gap: 20px;
            }


            .footer-col:last-of-type {
                border-bottom: none;
            }
        }

        .footer-tours ul {
            list-style: none;
            padding: 0;
        }

        .footer-tours ul li {
            margin-bottom: 8px;
        }

        .footer-tours li a {
            color: #ccc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-tours li a:hover {
            color: #4CAF50;
        }


        .footer-tours h4 {
            font-size: 1.2em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
            border-bottom: 2px solid #4CAF50;
            display: inline-block;
            padding-bottom: 5px;
        }

        .ah {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 10px;
            margin-top: auto;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            height: 65px;

        }

        .slideshow-container {
            position: relative;
            max-width: 800px;
            width: 90%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #slide {
            width: 100%;
            display: block;
            transition: opacity 0.8s ease-in-out;
        }

        .fade-in {
            animation: fadeInEffect 1.5s;
        }

        @keyframes fadeInEffect {
            from {
                opacity: 0.3;
            }

            to {
                opacity: 1;
            }
        }

        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);

            width: 60px;
            height: 60px;
            border-radius: 50%;

            background-color: #e9e0d2;
            color: #d35400;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 30px;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .prev {
            left: 20px;
        }

        .next {
            right: 20px;
        }

        .prev:hover,
        .next:hover {
            background-color: #fdfaf5;
            transform: translateY(-50%) scale(1.1);
        }

        .prev::before {
            content: '❮';
        }

        .next::before {
            content: '❯';
        }



        .slider-nav {
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 10;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            transition: background-color 0.3s, transform 0.2s;
        }

        .slider-nav:hover {
            background-color: #3e8e41;
            transform: translateY(-50%) scale(1.05);
        }

        .slider-nav:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: translateY(-50%);
        }

        .activity-card.hidden {
            opacity: 0;
            transform: translateY(20px);
        }

        .activity-card.visible {
            opacity: 1;
            transform: translateY(0);
        }




        @media screen and (max-width: 992px) {
            .slider-wrapper {
                padding: 0 20px;
            }

            .slider-nav {
                display: none;

            }
        }

        .kili-table-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fdfaf3;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .kili-table-title {
            color: #4a5d3a;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            font-family: 'Arial', sans-serif;
        }

        .route-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 0.95rem;
        }

        .route-table thead tr {
            background-color: #4a5d3a;
            color: #ffffff;
            text-align: left;
        }

        .footer-container ul li a {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            transition: 0.3s ease;
        }

        .footer-container ul li a:hover {
            color: #f4c542;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-3px);
            }

            50% {
                transform: translateX(3px);
            }

            75% {
                transform: translateX(-3px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .route-table th,
        .route-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #e0d8c8;
        }

        .route-table tbody tr:nth-child(even) {
            background-color: #f4eee1;
        }

        .route-table tbody tr:hover {
            background-color: #ede4d1;
        }

        /* Status Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .fitness-high {
            background: #d15a2a;
            color: white;
        }

        .fitness-mod {
            background: #c69331;
            color: white;
        }

        .traffic-low {
            color: #2ecc71;
        }

        .traffic-med {
            color: #f1c40f;
        }

        .traffic-high {
            color: #e74c3c;
        }

        @media (max-width: 600px) {
            .route-table {
                font-size: 0.8rem;
            }
        }

         .navbar .nav-link {
            position: relative;
            font-weight: 600;
            font-size: 17px;
            transition: color 0.3s ease;
        }

        .navbar .nav-link:hover {
            color: #f3f5f3 !important;

        }

        .navbar .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 2px;
            background: #406445;
            transition: width 0.3s ease;
        }

        .navbar .nav-link:hover::after {
            width: 100%;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-3px);
            }

            50% {
                transform: translateX(3px);
            }

            75% {
                transform: translateX(-3px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .navbar .nav-link:hover {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>

<script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/yourcode.js" crossorigin="ano
