<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .vision-mission-container {
        position: relative;
        width: 400px;
        height: 150px;
    }


    .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        opacity: 0;
        transition: opacity 1s ease-in-out;
        text-align: center;
    }


    .slide.active {
        opacity: 1;
    }

    .vism {
        text-align: center;
        font-size: 30px;
    }

    .parvis {
        text-align: center;
        font-size: 30px;
    }

     .navbar .nav-link {
            position: relative;
            font-weight: 600;
            font-size: 17px;
            transition: color 0.3s ease;
        }

        .navbar .nav-link:hover {
            color: #f3f5f3 !important;

        }

        .navbar .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 2px;
            background: #406445;
            transition: width 0.3s ease;
        }

        .navbar .nav-link:hover::after {
            width: 100%;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-3px);
            }

            50% {
                transform: translateX(3px);
            }

            75% {
                transform: translateX(-3px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .navbar .nav-link:hover {
            animation: shake 0.3s ease-in-out;
        }
</style>

<body>
    <div class="vision-mission-container">
        <div id="vision-statement" class="slide active">
            <h2 class="vism">VISION</h2>
            <p class="parvis">"To become the superlative Tourism & Transportation Operator in Tanzania & Africa at
                Large"</p>
        </div>

        <div id="mission-statement" class="slide">
            <h2 class="vism">MISSION</h2>
            <p class="parvis">"To provide unforgettable, safe, and quality travel experiences while promoting
                sustainable tourism and empowering local communities."</p>
        </div>
    </div>
</body>

</html>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const vision = document.getElementById('vision-statement');
        const mission = document.getElementById('mission-statement');
        const duration = 5000;

        let isVision = true;

        function switchSlide() {
            if (isVision) {
                vision.classList.remove('active');
                mission.classList.add('active');
            } else {
                mission.classList.remove('active');
                vision.classList.add('active');
            }
            isVision = !isVision;
        }

        setInterval(switchSlide, duration);
    });
</script>
</body>

</html>
