<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .info-section {
        width: 90%;
        margin: 60px auto;
        display: flex;
        align-items: center;
        gap: 40px;
    }

    .left-image {
        flex: 1;
    }

    .left-image img {
        width: 100%;
        border-radius: 10px;
    }

    .right-text {
        flex: 1;
    }

    .right-text h2 {
        font-size: 36px;
        margin-bottom: 15px;
    }

    .right-text p {
        line-height: 1.7;
        margin-bottom: 20px;
    }

    .explore-link {
        text-decoration: none;
        background: #1b5e20;
        color: white;
        padding: 12px 24px;
        border-radius: 6px;
    }
</style>

<body>
    <section class="info-section">

        <div class="left-image">
            <img src="img/blue4.avif" alt="Safari view">
        </div>

        <div class="right-text">
            <h2>Plan Your Safari</h2>
            <p>
                Experience Tanzania’s incredible wildlife and landscapes.
                Discover lodges, activities, and the best safari adventures
                waiting for you.
            </p>

            <a href="plan.html" class="explore-link">Explore More</a>
        </div>

    </section>
</body>

</html>
